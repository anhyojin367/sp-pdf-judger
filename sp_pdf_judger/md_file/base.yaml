version: 1.0

# -------------------------
# 단위 표준화
# -------------------------
units:
  µg: ug
  μg: ug
  ug: ug

  mg: mg
  g: g
  kg: kg

  mL: mL
  ml: mL
  L: L

  IU/mL: IU_per_mL
  CFU/10mL: CFU_per_10mL
  log LD40/mL: log_LD40_per_mL

# -------------------------
# 키워드 판정
# -------------------------
text_judgement:
  pass:
    - 적합
    - 합격
    - 이상 없음

  fail:
    - 부적합
    - 불합격
    - 기준 미달

# -------------------------
# 비교 연산자
# -------------------------
comparators:
  이상: ">="
  이하: "<="
  초과: ">"
  미만: "<"
  같음: "=="

# -------------------------
# 필드 정의 (JSON 안정화)
# -------------------------
fields:
  - 시험방법
  - 시험기준
  - 시험기간
  - 시험일자
  - 시험결과
  - 로트번호
  - 판정

# -------------------------
# UI 표시 순서
# -------------------------
ui_order:
  - 시험방법
  - 시험기준
  - 시험기간
  - 시험일자
  - 시험결과

# -------------------------
# 섹션 구조
# -------------------------
sections:
  "1": "일반정보"

  "2": "재료"
  "2.1": "정보"
  "2.1.1": "바이러스주"
  "2.1.2": "동물"

  "2.2": "시험"
  "2.2.1": "마스터 바이러스주에 대한 시험"

# -------------------------
# 기본 판정 전략
# -------------------------
default_rules:
  numeric_compare: true
  allow_text_override: true